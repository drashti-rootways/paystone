query CartInput {
  cart {
    balance: attribute(key: "paystoneBalance") {
      value
    }

    lock: attribute(key: "paystoneLock") {
      value
    }

    config: attribute(key: "paystoneConfig") {
      value
    }

    cost {
      totalAmount {
        amount
      }
    }

    lines {
      id
    }
  }

  discount {
    discountClasses
  }
}
